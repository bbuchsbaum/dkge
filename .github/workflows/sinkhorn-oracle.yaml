on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

name: sinkhorn-oracle

permissions: read-all

jobs:
  sinkhorn-oracle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgload, any::testthat, any::T4transport, local::.

      - name: Run Sinkhorn oracle tests
        run: |
          if (!requireNamespace("T4transport", quietly = TRUE)) {
            stop("T4transport is required for sinkhorn oracle tests.")
          }
          pkgload::load_all(".", quiet = TRUE)
          testthat::test_local(
            ".",
            filter = "transport-sinkhorn",
            stop_on_failure = TRUE,
            reporter = "summary"
          )
        shell: Rscript {0}
